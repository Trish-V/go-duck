app:
  # Core Metadata
  name: go-duck
  version: 1.0.0
  description: "Evolutionary Go Microservice with Dual-Protocol & Dynamic Multi-Tenancy"

  # Server Configuration
  server:
    port: 8080
    read-timeout: 30s
    write-timeout: 30s
    grpc:
      addr: ":9000"
      network: "tcp"
      timeout: "1s"
    cors:
      allow-origins: ["*"]
      allow-methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
      allow-headers: ["Origin", "Content-Type", "Accept", "Authorization", "X-Tenant-ID"]

  # Security (Keycloak OIDC + Rate Limiting)
  security:
    keycloak-host: "http://localhost:9080"
    keycloak-realm: "master"
    keycloak-client-id: "internal"
    keycloak-secret: "internal"
    rate-limit:
      rps: 100
      burst: 200

  # Multi-Tenancy (Master DB + Hot-Swapping Tenant DBs)
  multitenancy:
    enabled: true
    # The generator will automatically use 'datasource' for the Master Registry

  # Primary (Master) Datasource
  datasource:
    host: "localhost"
    port: 5432
    username: "postgres"
    password: "password"
    database: "go_duck_master"
    max-open-conns: 25
    max-idle-conns: 10
    conn-max-lifetime: "5m"

  # Real-Time Messaging (MQTT)
  messaging:
    mqtt:
      enabled: false # Set to true to broadcast CRUD events
      broker: "tcp://localhost:1883"
      client-id: "go-duck-engine"
      topic-prefix: "go-duck/notifications"

  # Distributed Caching (Redis)
  cache:
    redis:
      enabled: false # Set to true for tenant-prefixed caching
      host: "localhost:6379"
      password: ""
      db: 0
      ttl: "10m"

  # Resilience Patterns (Circuit Breakers)
  resilience:
    circuit-breaker:
      enabled: true
      failure-threshold: 5
      success-threshold: 2
      timeout: "60s"

  # Observability (OpenTelemetry)
  telemetry:
    otel:
      enabled: false # Set to true to stream traces to Collector
      endpoint: "localhost:4317"
      sampler-ratio: 1.0

  # Logging (Structured & Cloud-Ready)
  logging:
    datadog:
      enabled: false
      api-key: "YOUR_API_KEY"
      site: "datadoghq.com"
      service: "go-duck-service"