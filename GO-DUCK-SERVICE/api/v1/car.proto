syntax = "proto3";

package api.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "go-duck/api/v1;v1";

service CarService {
  rpc CreateCar (CreateCarRequest) returns (CarReply) {
    option (google.api.http) = {
      post: "/v1/car"
      body: "*"
    };
  }
  rpc UpdateCar (UpdateCarRequest) returns (CarReply) {
    option (google.api.http) = {
      put: "/v1/car/{id}"
      body: "*"
    };
  }
  rpc DeleteCar (DeleteCarRequest) returns (DeleteCarReply) {
    option (google.api.http) = {
      delete: "/v1/car/{id}"
    };
  }
  rpc GetCar (GetCarRequest) returns (CarReply) {
    option (google.api.http) = {
      get: "/v1/car/{id}"
    };
  }
  rpc ListCar (ListCarRequest) returns (ListCarReply) {
    option (google.api.http) = {
      get: "/v1/car"
    };
  }
}

message Car {
  uint64 id = 1;
  string name = 2;
  string model = 3;
  int32 year = 4;
  double price = 5;
  string color = 6;
  string features = 7;
  google.protobuf.Timestamp created_at = 100;
  google.protobuf.Timestamp updated_at = 101;
}

message CreateCarRequest {
  string name = 1;
  string model = 2;
  int32 year = 3;
  double price = 4;
  string color = 5;
  string features = 6;
}

message UpdateCarRequest {
  uint64 id = 1;
  string name = 2;
  string model = 3;
  int32 year = 4;
  double price = 5;
  string color = 6;
  string features = 7;
}

message DeleteCarRequest {
  uint64 id = 1;
}

message DeleteCarReply {
  string message = 1;
}

message GetCarRequest {
  uint64 id = 1;
}

message CarReply {
  Car data = 1;
}

message ListCarRequest {
  int32 page = 1;
  int32 page_size = 2;
  string query = 3;
}

message ListCarReply {
  repeated Car results = 1;
  int64 total = 2;
}
