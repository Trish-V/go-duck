syntax = "proto3";

package api.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "go-duck/api/v1;v1";

service AuthorService {
  rpc CreateAuthor (CreateAuthorRequest) returns (AuthorReply) {
    option (google.api.http) = {
      post: "/v1/author"
      body: "*"
    };
  }
  rpc UpdateAuthor (UpdateAuthorRequest) returns (AuthorReply) {
    option (google.api.http) = {
      put: "/v1/author/{id}"
      body: "*"
    };
  }
  rpc DeleteAuthor (DeleteAuthorRequest) returns (DeleteAuthorReply) {
    option (google.api.http) = {
      delete: "/v1/author/{id}"
    };
  }
  rpc GetAuthor (GetAuthorRequest) returns (AuthorReply) {
    option (google.api.http) = {
      get: "/v1/author/{id}"
    };
  }
  rpc ListAuthor (ListAuthorRequest) returns (ListAuthorReply) {
    option (google.api.http) = {
      get: "/v1/author"
    };
  }
}

message Author {
  uint64 id = 1;
  string name = 2;
  google.protobuf.Timestamp created_at = 100;
  google.protobuf.Timestamp updated_at = 101;
}

message CreateAuthorRequest {
  string name = 1;
}

message UpdateAuthorRequest {
  uint64 id = 1;
  string name = 2;
}

message DeleteAuthorRequest {
  uint64 id = 1;
}

message DeleteAuthorReply {
  string message = 1;
}

message GetAuthorRequest {
  uint64 id = 1;
}

message AuthorReply {
  Author data = 1;
}

message ListAuthorRequest {
  int32 page = 1;
  int32 page_size = 2;
  string query = 3;
}

message ListAuthorReply {
  repeated Author results = 1;
  int64 total = 2;
}
