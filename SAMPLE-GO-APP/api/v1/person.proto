syntax = "proto3";

package api.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "go-duck/api/v1;v1";

service PersonService {
  rpc CreatePerson (CreatePersonRequest) returns (PersonReply) {
    option (google.api.http) = {
      post: "/v1/person"
      body: "*"
    };
  }
  rpc UpdatePerson (UpdatePersonRequest) returns (PersonReply) {
    option (google.api.http) = {
      put: "/v1/person/{id}"
      body: "*"
    };
  }
  rpc DeletePerson (DeletePersonRequest) returns (DeletePersonReply) {
    option (google.api.http) = {
      delete: "/v1/person/{id}"
    };
  }
  rpc GetPerson (GetPersonRequest) returns (PersonReply) {
    option (google.api.http) = {
      get: "/v1/person/{id}"
    };
  }
  rpc ListPerson (ListPersonRequest) returns (ListPersonReply) {
    option (google.api.http) = {
      get: "/v1/person"
    };
  }
}

message Person {
  uint64 id = 1;
  string firstName = 2;
  string lastName = 3;
  string email = 4;
  int32 age = 5;
  string preferences = 6;
  google.protobuf.Timestamp created_at = 100;
  google.protobuf.Timestamp updated_at = 101;
}

message CreatePersonRequest {
  string firstName = 1;
  string lastName = 2;
  string email = 3;
  int32 age = 4;
  string preferences = 5;
}

message UpdatePersonRequest {
  uint64 id = 1;
  string firstName = 2;
  string lastName = 3;
  string email = 4;
  int32 age = 5;
  string preferences = 6;
}

message DeletePersonRequest {
  uint64 id = 1;
}

message DeletePersonReply {
  string message = 1;
}

message GetPersonRequest {
  uint64 id = 1;
}

message PersonReply {
  Person data = 1;
}

message ListPersonRequest {
  int32 page = 1;
  int32 page_size = 2;
  string query = 3;
}

message ListPersonReply {
  repeated Person results = 1;
  int64 total = 2;
}
enum ArticleStatus {
  ArticleStatus_UNSPECIFIED = 0;
  ArticleStatus_DRAFT = 1;
  ArticleStatus_PUBLISHED = 2;
  ArticleStatus_ARCHIVED = 3;
}
