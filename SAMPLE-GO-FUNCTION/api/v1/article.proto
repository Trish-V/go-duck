syntax = "proto3";

package api.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "go-duck/api/v1;v1";

service ArticleService {
  rpc CreateArticle (CreateArticleRequest) returns (ArticleReply) {
    option (google.api.http) = {
      post: "/v1/article"
      body: "*"
    };
  }
  rpc UpdateArticle (UpdateArticleRequest) returns (ArticleReply) {
    option (google.api.http) = {
      put: "/v1/article/{id}"
      body: "*"
    };
  }
  rpc DeleteArticle (DeleteArticleRequest) returns (DeleteArticleReply) {
    option (google.api.http) = {
      delete: "/v1/article/{id}"
    };
  }
  rpc GetArticle (GetArticleRequest) returns (ArticleReply) {
    option (google.api.http) = {
      get: "/v1/article/{id}"
    };
  }
  rpc ListArticle (ListArticleRequest) returns (ListArticleReply) {
    option (google.api.http) = {
      get: "/v1/article"
    };
  }
}

message Article {
  uint64 id = 1;
  string title = 2;
  string content = 3;
  string status = 4;
  string publishedDate = 5;
  google.protobuf.Timestamp created_at = 100;
  google.protobuf.Timestamp updated_at = 101;
}

message CreateArticleRequest {
  string title = 1;
  string content = 2;
  string status = 3;
  string publishedDate = 4;
}

message UpdateArticleRequest {
  uint64 id = 1;
  string title = 2;
  string content = 3;
  string status = 4;
  string publishedDate = 5;
}

message DeleteArticleRequest {
  uint64 id = 1;
}

message DeleteArticleReply {
  string message = 1;
}

message GetArticleRequest {
  uint64 id = 1;
}

message ArticleReply {
  Article data = 1;
}

message ListArticleRequest {
  int32 page = 1;
  int32 page_size = 2;
  string query = 3;
}

message ListArticleReply {
  repeated Article results = 1;
  int64 total = 2;
}
enum ArticleStatus {
  ArticleStatus_UNSPECIFIED = 0;
  ArticleStatus_DRAFT = 1;
  ArticleStatus_PUBLISHED = 2;
  ArticleStatus_ARCHIVED = 3;
}
