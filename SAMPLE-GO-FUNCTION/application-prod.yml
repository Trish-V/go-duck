go-duck:
  name: go-duck
  version: 1.0.0
  description: go function generator
  security:
    keycloak-host: http://localhost:9080
    keycloak-realm: master
    keycloak-client-id: internal
    keycloak-secret: internal
    rate-limit:
      rps: 100
      burst: 200
  multitenancy:
    enabled: true
  datasource:
    host: localhost
    port: 5432
    username: postgres
    password: password
    database: go-duck
    max-open-conns: 100
    max-idle-conns: 50
    conn-max-lifetime: 5m
  server:
    port: 8080
    read-timeout: 30s
    write-timeout: 30s
    grpc:
      addr: ':9000'
      network: tcp
      timeout: 1s
    cors:
      allow-origins:
        - https://your-domain.com
      allow-methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allow-headers:
        - Origin
        - Content-Type
        - Accept
        - Authorization
  logging:
    datadog:
      enabled: true
      api-key: YOUR_DATADOG_API_KEY
      site: datadoghq.com
      service: go-duck
  messaging:
    mqtt:
      enabled: true
      broker: tcp://mqtt.production.svc:1883
      client-id: go-duck-prod
      username: prod_user
      password: prod_password
      topic-prefix: go-duck/events
  cache:
    redis:
      enabled: true
      host: redis.production.svc:6379
      password: prod_redis_password
      db: 0
      ttl: 1h
  resilience:
    circuit-breaker:
      enabled: true
      failure-threshold: 3
      success-threshold: 5
      timeout: 30s
  telemetry:
    otel:
      enabled: true
      endpoint: otel-collector.monitoring.svc:4317
      sampler-ratio: 0.1
environment:
  active_profile: prod
